{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamFlow — Create Organization</title>
  <link rel="stylesheet" href="{% static 'core/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/landing.css' %}">
</head>
<body>

<script>
  (function(){
    var t = localStorage.getItem('tf-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>

<button class="auth-dark-toggle" onclick="toggleDark()" id="dark-btn">🌙</button>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">TeamFlow</div>
    <div class="auth-tagline">Set up your organization in seconds</div>

    <h2 class="auth-title">Create your workspace</h2>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register/" autocomplete="off">
      {% csrf_token %}

      <div class="auth-form-group">
        <label class="auth-label" for="org_name">Organization Name</label>
        <input class="auth-input" type="text" id="org_name" name="org_name"
               required autocomplete="off" placeholder="e.g. Acme Corp">
      </div>

      <div class="auth-form-group">
        <label class="auth-label" for="reg-username">
          Your Username
          <span style="color:rgba(255,255,255,0.35); font-weight:400; font-size:0.80rem;">
            (you'll be the Owner)
          </span>
        </label>
        <input class="auth-input" type="text" id="reg-username" name="username"
               required autocomplete="off" placeholder="choose a username">
      </div>

      <div class="auth-form-group">
        <label class="auth-label" for="reg-email">Email</label>
        <input class="auth-input" type="email" id="reg-email" name="email"
               required autocomplete="off" placeholder="you@yourorg.com">
      </div>

      <div class="auth-form-group">
        <label class="auth-label" for="reg-password">Password</label>
        <div class="auth-password-wrap">
          <input class="auth-input" type="password" id="reg-password" name="password"
                 required autocomplete="new-password" placeholder="••••••••">
          <button type="button" class="auth-eye" onclick="togglePassword('reg-password', this)">👁</button>
        </div>
      </div>

      <div class="auth-form-group">
        <label class="auth-label" for="reg-confirm">Confirm Password</label>
        <div class="auth-password-wrap">
          <input class="auth-input" type="password" id="reg-confirm" name="confirm_password"
                 required autocomplete="new-password" placeholder="••••••••">
          <button type="button" class="auth-eye" onclick="togglePassword('reg-confirm', this)">👁</button>
        </div>
      </div>

      <button type="submit" class="auth-btn">Create Organization →</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login/">Log in</a>
    </div>
  </div>
</div>

<script src="{% static 'core/js/main.js' %}"></script>
<script>
function togglePassword(id, btn) {
  var el = document.getElementById(id);
  if (!el) return;
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}
</script>

</body>
</html>
