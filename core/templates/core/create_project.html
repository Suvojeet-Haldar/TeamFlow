<!DOCTYPE html>
<html>
<head>
    <title>TeamFlow — New Project</title>
</head>
<body>

<h1>Create New Project</h1>

<form method="POST">
    {% csrf_token %}
    <p>
        Name:<br>
        <input type="text" name="name" required>
    </p>
    <p>
        Description:<br>
        <textarea name="description" rows="4"></textarea>
    </p>
    <button type="submit">Create Project</button>
    <a href="/projects/" style="margin-left:12px;">Cancel</a>
</form>

</body>
</html>
