{% extends "base.html" %}

{% block content %}

<h1>Assign Project Manager</h1>
<p style="margin-bottom:24px;">Project: <strong>{{ project.name }}</strong></p>

<form method="POST">
    {% csrf_token %}
    <p>
        Select Manager:<br>
        <select name="manager_id">
            <option value="">— Remove manager —</option>
            {% for mgr in org_managers %}
                <option value="{{ mgr.id }}"
                    {% if project.manager and project.manager.id == mgr.id %}selected{% endif %}>
                    {{ mgr.username }} ({{ mgr.org_role.name }})
                </option>
            {% endfor %}
        </select>
    </p>
    <button type="submit">Save</button>
    <a href="/projects/" style="margin-left:12px;">Cancel</a>
</form>

{% endblock %}
